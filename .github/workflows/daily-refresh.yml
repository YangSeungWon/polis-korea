name: Daily data refresh

# 매일 KST 06:37 (UTC 21:37). 새벽이라 NESDC 트래픽 적고 사용자 깨기 전 데이터 신선.
# 수동 trigger도 가능 (Actions 탭 → Run workflow).
on:
  schedule:
    - cron: '37 21 * * *'
  workflow_dispatch: {}

# 동시 실행 1개만 (data race 방지).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # commit + push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install pdfplumber pymupdf scipy numpy requests

      # raw PDF cache (3GB 정도 — 매 실행 재다운 안 하게).
      # data/raw/* 는 .gitignore라 commit엔 안 들어가지만 캐시는 유지.
      - name: Cache raw PDFs
        uses: actions/cache@v4
        with:
          path: |
            data/raw/pdf
            data/raw/grids
            data/raw/parsed
          # 캐시 키는 매일 다르게(=캐시 갱신) + 이전 키로 restore (이전 PDF 보존)
          key: rawdata-${{ github.run_id }}
          restore-keys: |
            rawdata-

      - name: Pipeline
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: |
          set -e
          echo "=== 1. scrape_nesdc ==="
          python scripts/scrape_nesdc.py
          echo "=== 2. refresh_pending_pdfs ==="
          python scripts/refresh_pending_pdfs.py
          echo "=== 3. parse_pdf (신규만) ==="
          python scripts/parse_pdf.py --skip-existing --jobs 4 'data/raw/pdf/*.pdf'
          echo "=== 4. patch_cross_tab ==="
          python scripts/patch_cross_tab.py
          echo "=== 5. patch_byelection ==="
          python scripts/patch_byelection.py
          echo "=== 6. build_polls ==="
          python scripts/build_polls.py
          echo "=== 7. build_byelection ==="
          python scripts/build_byelection.py
          echo "=== 8. build_static + optimize ==="
          python scripts/build_static.py
          python scripts/optimize_data.py

      - name: Golden tests (회귀 검출)
        run: |
          python tests/test_golden.py
          python tests/test_parser_golden.py
          python tests/test_build_golden.py

      - name: Audit (error 시 워크플로 실패)
        run: python scripts/audit_quality.py

      - name: Commit & push if changed
        run: |
          git config user.name "polis-bot"
          git config user.email "noreply@anthropic.com"
          git add data/polls/ data/audits/ sitemap.xml
          if git diff --staged --quiet; then
            echo "변경 없음 — push skip"
          else
            git commit -m "데이터 갱신 (자동): $(date +%Y-%m-%d)"
            git push
          fi
