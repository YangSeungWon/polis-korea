name: Daily data refresh

# 매일 KST 06:37 (UTC 21:37). 새벽이라 NESDC 트래픽 적고 사용자 깨기 전 데이터 신선.
# 수동 trigger도 가능 (Actions 탭 → Run workflow).
on:
  schedule:
    - cron: '37 21 * * *'
  workflow_dispatch: {}

# 동시 실행 1개만 (data race 방지).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # commit + push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      # raw PDF cache (매일 누적). data/raw/* 는 .gitignore — commit 안 들어가지만 cache 유지.
      - name: Cache raw PDFs
        id: cache-raw
        uses: actions/cache@v4
        with:
          path: |
            data/raw/pdf
            data/raw/grids
            data/raw/parsed
          key: rawdata-${{ github.run_id }}
          restore-keys: |
            rawdata-

      # cache miss (첫 실행 또는 cache 만료 후) — Release zip 다운로드해서 base 복원.
      # 그 이후 scrape_nesdc가 신규만 추가. 다음 실행부터는 cache hit.
      - name: Restore from Release (cache miss only)
        if: steps.cache-raw.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — Release zip 다운로드"
          gh release download raw-bundle-v1 \
            --repo YangSeungWon/polis-korea \
            --pattern 'raw-bundle.tar.gz' \
            --dir /tmp || true
          if [ -f /tmp/raw-bundle.tar.gz ]; then
            tar -xzf /tmp/raw-bundle.tar.gz -C data/
            echo "복원: $(ls data/raw/pdf | wc -l) PDFs"
            rm /tmp/raw-bundle.tar.gz
          else
            echo "Release zip 다운로드 실패 — scrape가 처음부터 받음"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Pipeline
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: |
          set -e
          # 1·2단계는 NESDC 접속에 의존 — GitHub 러너 IP가 차단/타임아웃되는 일이 잦다.
          # 실패해도 job을 죽이지 않고(|| echo) 기존 데이터로 빌드를 계속한다(놓친 신규는
          # 다음 run이 증분 회수). timeout으로 hang도 차단해 60분 job timeout 방지.
          echo "=== 1. scrape_nesdc (active 선거 gubun 자동 — 메타에서 읽음) ==="
          timeout 600 python scripts/fetch/scrape_nesdc.py --active --stop-after-known-pages 3 \
            || echo "⚠ scrape 실패/타임아웃 — NESDC 접속 불가 추정, 기존 데이터로 계속"
          echo "=== 2. refresh_pending_pdfs ==="
          timeout 600 python scripts/fetch/refresh_pending_pdfs.py \
            || echo "⚠ refresh_pending 실패/타임아웃 — 계속"
          echo "=== 3. parse_pdf (신규만) ==="
          python scripts/parse/parse_pdf.py --skip-existing --jobs 4 'data/raw/pdf/*.pdf'
          echo "=== 4. patch_cross_tab ==="
          python scripts/parse/patch_cross_tab.py
          echo "=== 5. patch_byelection ==="
          python scripts/build/patch_byelection.py
          echo "=== 6. build_polls ==="
          python scripts/build/build_polls.py
          echo "=== 7. build_byelection ==="
          python scripts/build/build_byelection.py
          echo "=== 8. build_static ==="
          python scripts/build/build_static.py
          # optimize_data(data/*.json in-place minify) 제거: 서빙=커밋(master 루트)이고
          # 레포 컨벤션은 pretty(indent=2). minify를 커밋하면 39k줄 diff로 컨벤션 붕괴.
          # Pages는 gzip 서빙이라 공백 minify의 전송 이득은 사실상 0. geo 좌표절삭이
          # 필요하면 별도 수동/배포 단계로 분리할 것.
          echo "=== 9. 기초의원 9회 확정 회수 (NEC OpenAPI 게시 시 — 미게시(INFO-03)면 자동 skip) ==="
          python scripts/fetch/fetch_council_winners.py --rebuild --n 9 || true
          if ! git diff --quiet data/results/9th-local-2026.json; then
            echo "  → 9회 기초의원 확정 회수됨 → timeline 재집계 (아카이브는 result JSON 런타임 fetch)"
            python scripts/build/build_timeline.py
          fi

      - name: Golden tests (회귀 검출)
        run: |
          python tests/test_golden.py
          python tests/test_parser_golden.py
          python tests/test_build_golden.py

      - name: Audit (error 시 워크플로 실패)
        run: python scripts/audit/audit_quality.py

      - name: Commit & push if changed
        run: |
          git config user.name "polis-bot"
          git config user.email "noreply@anthropic.com"
          git add data/polls/ data/audits/ sitemap.xml data/results/9th-local-2026.json data/timeline.json
          if git diff --staged --quiet; then
            echo "변경 없음 — push skip"
          else
            git commit -m "데이터 갱신 (자동): $(date +%Y-%m-%d)"
            git push
          fi
