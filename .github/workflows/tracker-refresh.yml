name: Weekly tracker refresh

# tracker(국정평가·정당지지·차기주자)의 상시 소스 VT012("기타" 전국 정기조사)를 주간 갱신.
# VT012는 매주 차오르므로 주 1회면 충분. daily-refresh(선거 폴+빌드)와 별개.
#
# ⚠ 핵심: PDF 코퍼스를 CI에 들고 오지 않는다(과거 PDF는 로컬에만). 대신
#   - data/raw/nesdc_etc_polls.csv (목록)를 git에 커밋 → scrape가 항상 증분(0부터 재스크랩 X)
#   - approval_*.json / aggregated_etc.json (전체 history)을 커밋 → 추출기 --incremental이 done skip
# 따라서 cold run도 "신규 폴만" 처리 → 수 분. (이전 설계는 Release에서 PDF를 받다 5h 초과해 실패.)
on:
  schedule:
    - cron: '47 21 * * 0'   # 일요일 UTC 21:47 = 월요일 KST 06:47
  workflow_dispatch: {}

# daily-refresh와 같은 그룹 — raw 데이터 동시 접근 방지(큐잉).
concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      # 신규로 받은 VT012 PDF만 캐시(재시도 시 재다운로드 회피용 — 정합성은 커밋된 CSV/JSON이 보장).
      # daily와 분리된 네임스페이스(restore-keys에 'rawdata-' 없음) — 거대한 daily 캐시 안 끌어옴.
      - name: Cache new VT012 PDFs
        uses: actions/cache@v4
        with:
          path: data/raw/pdf
          key: tracker-pdf-${{ github.run_id }}
          restore-keys: tracker-pdf-

      # 목록 최신순 → 마지막 신규 이후 3p 연속 기존이면 조기 종료(전체 ~260p 페이징 회피).
      - name: Scrape VT012 (커밋된 CSV 기준 증분 — 신규 폴만)
        run: |
          python scripts/fetch/scrape_nesdc.py \
            --gubun VT012 --csv data/raw/nesdc_etc_polls.csv \
            --stop-after-known-pages 3

      # NESDC는 목록을 먼저 등록하고 결과 PDF를 나중에 첨부하는 경우가 많음(주간집계 등).
      # scrape 당시 PDF 없던 pending 건을 재시도 — 못 받으면 다음 주 run이 회수.
      - name: Refresh pending PDFs (늦게 첨부된 결과표 회수)
        run: python scripts/fetch/refresh_pending_pdfs.py --csv data/raw/nesdc_etc_polls.csv --max-days 14

      - name: Extract tracker data (incremental — 기존 보존·신규만 추가)
        run: |
          set -e
          for s in gallup realmeter nbs hrc general; do
            echo "=== extract_approval_$s ==="
            python scripts/parse/extract_approval_$s.py --incremental
          done
          echo "=== extract_party_support ==="
          python scripts/parse/extract_party_support.py --incremental

      # 갱신된 목록 CSV + 추출 JSON을 함께 커밋(CSV가 stale하면 다음 run이 재스크랩하므로 필수).
      - name: Commit & push if changed
        run: |
          git config user.name "polis-bot"
          git config user.email "noreply@anthropic.com"
          git add data/raw/nesdc_etc_polls.csv \
                  data/polls/approval_gallup.json data/polls/approval_realmeter.json \
                  data/polls/approval_nbs.json data/polls/approval_hrc.json \
                  data/polls/approval_general.json data/polls/aggregated_etc.json
          if git diff --staged --quiet; then
            echo "tracker 변경 없음 — push skip"
          else
            git commit -m "tracker 데이터 갱신 (자동·VT012): $(date +%Y-%m-%d)"
            git push
          fi
